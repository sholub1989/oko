name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Audit package for source leaks
        run: |
          PACK_OUTPUT=$(npm pack --dry-run 2>&1)

          if echo "$PACK_OUTPUT" | grep -E '\.tsx?$' | grep -v '\.d\.ts$' | grep -q .; then
            echo "::error::TypeScript source files detected in npm package!"
            echo "$PACK_OUTPUT" | grep -E '\.tsx?$'
            exit 1
          fi

          if echo "$PACK_OUTPUT" | grep -q '/src/'; then
            echo "::error::src/ directories detected in npm package!"
            echo "$PACK_OUTPUT" | grep '/src/'
            exit 1
          fi

          if echo "$PACK_OUTPUT" | grep -q '\.map$'; then
            echo "::error::Sourcemap files detected in npm package!"
            echo "$PACK_OUTPUT" | grep '\.map$'
            exit 1
          fi

          echo "Package audit passed. Contents:"
          echo "$PACK_OUTPUT" | grep "npm notice"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
